# =============================================================================
#  deploy-frontend.yml
#
#  Builds the React + Vite frontend and publishes it to GitHub Pages.
#  Triggered on every push (merge) to the `main` branch.
#
#  Required GitHub variable  (Settings → Secrets and variables → Actions →
#  Variables tab  OR  Environments → github-pages → Variables):
#    VITE_API_BASE_URL   The public Fly.io backend URL, e.g.
#                        https://ratex-backend.fly.dev
#                        Leave empty to use relative paths (API must be on same origin).
#
#  To enable GitHub Pages:
#    Settings → Pages → Source = "GitHub Actions"
# =============================================================================

name: Deploy Frontend → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:      # allow manual trigger from the Actions tab

# Allow the workflow to write to the gh-pages deployment
permissions:
  contents: read
  pages:    write
  id-token: write

# Only one Pages deployment at a time — cancel in-flight runs on new push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Vite app
    runs-on: ubuntu-latest
    environment: github-pages   # gives access to environment-level variables incl. VITE_API_BASE_URL

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          # Sub-directory base path for GitHub Pages  (/<repo>/)
          # Change if you use a custom domain (set to /)
          VITE_BASE_PATH: /RateX/
          # Backend URL — read from the github-pages environment variable
          # Set it at: Settings → Environments → github-pages → Variables → VITE_API_BASE_URL = https://ratex-backend.fly.dev
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
