# =============================================================================
#  deploy-backend.yml
#
#  Triggers a Koyeb redeploy of the backend service whenever code is merged
#  to `main`.  Koyeb rebuilds the Docker image and rolls out the new version.
#
#  Required GitHub repository secrets  (Settings → Secrets and variables →
#  Actions → Secrets tab):
#    KOYEB_API_KEY      Your Koyeb API token.
#                       Koyeb dashboard → Account → API → Create API token.
#    KOYEB_SERVICE_ID   The UUID of the ratex-backend service.
#                       Visible in the URL when you open the service in Koyeb:
#                       https://app.koyeb.com/services/<SERVICE_ID>
#
#  NOTE: Only changes under backend/ trigger this job.
#        Pure frontend changes skip the backend deploy automatically.
# =============================================================================

name: Deploy Backend → Koyeb

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - koyeb-setup.yaml
  workflow_dispatch:    # allow manual trigger

jobs:
  deploy:
    name: Trigger Koyeb redeploy
    runs-on: ubuntu-latest

    steps:
      - name: Redeploy service on Koyeb
        run: |
          STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "https://app.koyeb.com/v1/services/${{ secrets.KOYEB_SERVICE_ID }}/redeploy" \
            -H "Authorization: Bearer ${{ secrets.KOYEB_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Koyeb response (HTTP $STATUS):"
          cat response.json
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "::error::Koyeb redeploy failed with HTTP $STATUS"
            exit 1
          fi
          echo "::notice::Koyeb redeploy triggered successfully (HTTP $STATUS)"
