# =============================================================================
#  render.yaml — Render Blueprint
#
#  Defines the RateX backend web service on Render.
#  Redis is provided by Upstash (free tier, no payment required).
#
#  Full setup:
#    1. Create a free Redis DB at https://console.upstash.com
#       → copy the "Redis URL"  (rediss://...@...upstash.io:...)
#    2. Push this file to the root of your GitHub repo.
#    3. Go to https://dashboard.render.com → New → Blueprint Instance
#       → connect vikas528/RateX → Render reads this file.
#    4. When prompted, paste the Upstash Redis URL into the REDIS_URL field.
#    5. After the first deploy, copy the service URL and add it as a GitHub
#       repository variable:  VITE_API_BASE_URL = https://ratex-backend.onrender.com
# =============================================================================

services:

  # ── Go backend ─────────────────────────────────────────────────────────────
  - type: web
    name: ratex-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /ratex/health
    autoDeploy: false   # Triggered by GitHub Actions (deploy-backend.yml)
    envVars:
      # Paste your Upstash Redis URL here (rediss://default:<pwd>@<host>:<port>)
      # Get it free at https://console.upstash.com — no credit card required.
      #
      # SECRET: sync: false means this value is NEVER stored in this YAML or git.
      # Render will prompt you to enter it securely in the dashboard on first deploy,
      # and it is stored encrypted in Render's secret store.
      - key: REDIS_URL
        sync: false
      - key: RATE_LIMITER_ALGO
        value: sliding_window   # fixed_window | sliding_window | token_bucket
      - key: RATE_LIMITER_LIMIT
        value: 100
      - key: RATE_LIMITER_WINDOW_SECS
        value: 60
      - key: RATE_LIMITER_REFILL_RATE
        value: 1.0
