# =============================================================================
#  koyeb-setup.yaml  (reference / documentation — not a deploy config)
#
#  RateX backend is hosted on Koyeb (free tier, no credit card required).
#  Redis is provided by Upstash   (free tier, no credit card required).
#
#  ── One-time manual setup in the Koyeb dashboard ────────────────────────────
#
#  1. Create a free account at https://app.koyeb.com  (no card)
#
#  2. Create a free Redis DB at https://console.upstash.com  (no card)
#     → copy the "Redis URL"  (rediss://default:<pwd>@<host>.upstash.io:<port>)
#
#  3. In Koyeb dashboard → Create Service → Docker
#     - Source:          GitHub → vikas528/RateX
#     - Dockerfile path: backend/Dockerfile
#     - Build context:   backend
#     - Port:            8080
#     - Health check:    /ratex/health
#
#  4. Add environment variables in Koyeb:
#     REDIS_URL                  → paste Upstash Redis URL
#     RATE_LIMITER_ALGO          → sliding_window
#     RATE_LIMITER_LIMIT         → 100
#     RATE_LIMITER_WINDOW_SECS   → 60
#     RATE_LIMITER_REFILL_RATE   → 1.0
#
#  5. Deploy — note the public URL (e.g. https://ratex-backend-<hash>.koyeb.app)
#
#  6. In the Koyeb service settings → API → copy:
#       • API token  → add as GitHub secret  KOYEB_API_KEY
#       • Service ID → add as GitHub secret  KOYEB_SERVICE_ID
#
#  7. Add a GitHub repository variable:
#       VITE_API_BASE_URL = https://ratex-backend-<hash>.koyeb.app
#
#  After this, every push to main automatically redeploys backend + frontend.
# =============================================================================
