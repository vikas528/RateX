services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  app:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - RATE_LIMITER_ALGO=sliding_window
      - RATE_LIMITER_LIMIT=100
      - RATE_LIMITER_WINDOW_SECS=60
      - RATE_LIMITER_REFILL_RATE=1.0
      - REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure
  
  ui:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - app
    restart: on-failure