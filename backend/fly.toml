# fly.toml — Fly.io app configuration for the RateX backend
# Docs: https://fly.io/docs/reference/configuration/

app            = "ratex-backend"   # change to your chosen app name if taken
primary_region = "iad"             # US-East (cheapest / lowest latency to Upstash US)

[build]
  dockerfile = "Dockerfile"        # relative to this file (backend/)

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"     # spin down when idle — keeps free-tier usage at zero
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size       = "shared-cpu-1x"    # free tier machine size
  memory     = "256mb"
