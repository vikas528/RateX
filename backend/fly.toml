# fly.toml — Fly.io app configuration for the RateX backend
# Docs: https://fly.io/docs/reference/configuration/

app            = "ratex-backend"   # change to your chosen app name if taken
primary_region = "iad"             # US-East (cheapest / lowest latency to Upstash US)

[build]
  dockerfile = "Dockerfile"        # relative to this file (backend/)

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"     # spin down when idle to keep free-tier usage near zero
  auto_start_machines = true       # MUST be true — restarts the machine when a request arrives
                                   # (false = machines never wake up = permanent 5xx)
  min_machines_running = 0

[[vm]]
  size       = "shared-cpu-1x"    # free tier machine size
  memory     = "256mb"

# ──────────────────────────────────────────────────────────────────────
# REQUIRED SECRETS — set once with the Fly CLI, NOT stored in this file:
#
#   fly secrets set REDIS_URL="rediss://default:<token>@<host>.upstash.io:<port>"
#
# Get the URL from: Upstash Console → your database → "Connect" → copy the
# "rediss://" connection string.
#
# Optional rate-limiter defaults (override via the /ratex/config endpoint):
#   fly secrets set RATE_LIMITER_ALGO=token_bucket
#   fly secrets set RATE_LIMITER_LIMIT=100
#   fly secrets set RATE_LIMITER_WINDOW_SECS=60
#   fly secrets set RATE_LIMITER_REFILL_RATE=2.0
# ──────────────────────────────────────────────────────────────────────
